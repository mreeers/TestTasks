services:
  postgres:
    image: postgres:16
    container_name: taskmanagement-postgres
    environment:
      POSTGRES_DB: task_management_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d task_management_db"]
      interval: 5s
      timeout: 3s
      retries: 15
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: taskmanagement-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: proxmox
      RABBITMQ_DEFAULT_PASS: proxmox
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: taskmanagement-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  observer:
    build:
      context: .
      dockerfile: src/TaskManagement.Observer/Dockerfile
    container_name: taskmanagement-observer
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: proxmox
      RabbitMq__Password: proxmox
      Otlp__Endpoint: http://jaeger:4317
    ports:
      - "5080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: src/TaskManagement.API/Dockerfile
    container_name: taskmanagement-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__TaskManagementDb: Host=postgres;Port=5432;Database=task_management_db;Username=postgres;Password=postgres
      RabbitMq__Host: rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__Username: proxmox
      RabbitMq__Password: proxmox
      Observer__BaseUrl: http://observer:8080
      Otlp__Endpoint: http://jaeger:4317
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      observer:
        condition: service_started
      jaeger:
        condition: service_started

volumes:
  postgres_data:
  rabbitmq_data:
